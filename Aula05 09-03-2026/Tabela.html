<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crição de tabelas</title>
</head>
<body>
    <table border="10">              <!-- "table" cria tabelas e indica onde começa e termina-->
        <tr>                         <!-- "tr" onde começa a termina uma linha horizontal da tabela-->
            <td>Célula 1</td>        <!-- "td"onde começa e termina cada célula contida nas linhas da tabela -->
            <td>Célula 2</td>
            <td>Célula 3</td>
        </tr>
        <tr>
            <td>Célula 4</td>
            <td>Célula 5</td>
            <td>Célula 6</td>
        </tr>
    </table>
    <hr>
     <table border="10">               
        <tr>                        
            <td colspan="3">Célula 1</td>   <!-- "colspan" indica quantoas colunas a linha ocupa  -->       
            
        </tr>
        <tr>
            <td>Célula 2</td>
            <td>Célula 3</td>
            <td>Célula 4</td>
        </tr>
    </table>
    <hr>
     <table border="10">               
        <tr>                        
            <td rowspan="3">Célula 1</td>   <!-- "rowspan" indica quantoas linhas a coluna ocupa  -->
            <td>Célula 2</td>       
        </tr>
        <tr>
            <td>Célula 3</td>
        </tr>
        <tr>
            <td>Célula 4</td>
        </tr>
    </table>
</body>
</html>
