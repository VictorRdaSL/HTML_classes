<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução a CSS</title>
    <style>
        body{
            background-color: rgb(55, 206, 68);
        }
        h1 {
            color: rgb(0, 162, 255);
            font-size: 32px;
            background-color: rgb(220, 240, 40);
            text-align: center;
            font-style: italic;
        }
        h2 {
            color: red;
        }
        h3 {
            color: blue;
        }
        h4 {
            font-size: 19,5px;
            color: rgb(212, 255, 255);
        }
        p{
            color: grey;
            font-style: italic;
        }
    </style>
</head>
<body>
    
    <h1>Brasil</h1>
    <h2>Conhecendo o Brasil</h2>
    <hr>
    <h3>São Paulo</p>
    <h3>Rio de Janeiro</p>
    <h3>Minas Gerais</p>
    <b><h4>Espirito Santo</h4></b>
    <b><h4>Santa Catarina</h4></b>
    <b><h4>Rio Grande so Sul</h4></b>
    <hr>
    <p>Desenvolvido por Victor Rubens</p>
</body>
</html>
